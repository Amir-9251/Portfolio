<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="Profile">
      <div class="Profile__header">
        <a class="profile__img" href="images/profile_image.jpg">
          <img id="profileImage" src="images/profile_image.jpg" alt="" />
        </a>
        <div class="profile__upload">
          <input
            type="file"
            id="fileInput"
            class="profile__input"
            accept="image/*"
          />
        </div>
      </div>
      <div class="profile__body">
        <h3 class="heading">Amir Mehboob</h3>
        <p class="profession">Frontend engineer</p>
      </div>
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
